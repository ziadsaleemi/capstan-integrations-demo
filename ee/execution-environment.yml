---
version: 3

images:
  base_image:
    name: quay.io/ansible/awx-ee:latest

dependencies:
  ansible_core:
    package_pip: ansible-core
  ansible_runner:
    package_pip: ansible-runner
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt

additional_build_steps:
  append_final:
    - RUN ansible-galaxy collection list r92.capstan_demo
    - RUN python3 -c "import requests, yaml; print('Capstan EE dependencies ready')"

options:
  package_manager_path: /usr/bin/dnf
